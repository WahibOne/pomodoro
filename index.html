<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mon Pomo</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1e26">
    <link rel="apple-touch-icon" href="tomate_orig.png">    
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

    <style>
        html {
            background-color: #0a0c10;
            height: 100%;
        }

        :root {
            --bg-gradient: linear-gradient(to bottom, #1a1e26 0%, #2c3445 100%);
            --bg-focus-gradient: linear-gradient(to bottom, #0a0c10 0%, #151921 100%);
            --text-color: #ffffff;
            --btn-bg: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Varela Round', -apple-system, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            height: 100vh; margin: 0; padding-top: 15vh;
            background: var(--bg-gradient); 
            background-attachment: fixed;
            color: var(--text-color); 
            overflow: hidden; 
            background-color: #1a1e26;
            transition: background 1.2s ease-in-out, background-color 1.2s ease-in-out;
        }

        body.is-focusing {
            background-color: #0a0c10;
            background: var(--bg-focus-gradient);
        }

        #timer { 
            font-size: 7.5rem; font-weight: bold; font-variant-numeric: tabular-nums; letter-spacing: -2px;
            cursor: pointer; transition: transform 2.0s cubic-bezier(0.25, 1, 0.5, 1); z-index: 10;
        }
        #timer:active { transform: scale(0.95); opacity: 0.8; }
        
        body.is-focusing #timer { transform: translateY(20vh) scale(0.75); pointer-events: none; }

        #home-ui {
            display: flex; flex-direction: column; align-items: center;
            opacity: 1; transition: opacity 0.5s ease; position: absolute; width: 100%; bottom: 15vh; z-index: 9;
        }
        body.is-focusing #home-ui { opacity: 0; pointer-events: none; }

        #startBtn { 
            padding: 18px 20px; font-size: 1.3rem; border: 1px solid rgba(255,255,255,0.2); font-family: inherit; border-radius: 40px; 
            background: var(--btn-bg); color: var(--text-color); cursor: pointer; font-weight: 500;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); transition: all 0.2s;
        }
        #startBtn:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.2); }

        #skipBtn {
            position: absolute; 
            top: max(40px, env(safe-area-inset-top) + 10px); 
            right: max(20px, env(safe-area-inset-right));
            padding: 10px 20px; font-size: 1rem; font-family: inherit;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px; color: white; cursor: pointer;
            opacity: 0; pointer-events: none; transition: opacity 0.5s, transform 0.2s; z-index: 20;
        }
        #skipBtn:active { transform: scale(0.9); background: rgba(255, 255, 255, 0.2); }
        body.is-focusing #skipBtn { opacity: 1; pointer-events: auto; }

        body.is-focusing #world-container {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #settings-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg-gradient);
            z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transform: translateY(20px);
            visibility: hidden; 
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), visibility 0s 0.4s;
        }
        
        body.is-setting-time #settings-overlay { 
            opacity: 1; pointer-events: auto; transform: translateY(0); 
            visibility: visible; 
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), visibility 0s 0s;
        }

        body.is-focusing #settings-overlay {
            background: var(--bg-focus-gradient);
        }

        #preview-tomato-wrapper { height: 120px; display: flex; align-items: flex-end; justify-content: center; margin-bottom: 60px; }
        #preview-tomato { width: 50px; height: 50px; transition: width 0.1s, height 0.1s; }

        .dial-container { width: 100%; height: 180px; position: relative; overflow: hidden; cursor: grab; touch-action: none; }
        .dial-container:active { cursor: grabbing; }
        .dial-strip { position: absolute; top: 30; left: 0; height: 100%; display: flex; align-items: center; }
        
        .tick-mark { position: absolute; width: 2px; background: rgba(255,255,255,0.15); border-radius: 1px; top: 50%; transform: translateY(-50%); }
        .tick-mark.minor { height: 15px; }
        .tick-mark.major { height: 30px; }
        
        .tick-num { 
            position: absolute; 
            bottom: 45px; 
            left: 50%; 
            transform: translateX(-50%); 
            font-size: 1.5rem; 
            color: #535865; 
            font-weight: 600; 
            transition: all 0.2s ease;
        }

        .dial-pointer { position: absolute; left: 50%; top: 60%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .dial-pill { width: 6px; height: 40px; background: white; border-radius: 3px; margin-bottom: 12px; }
        .dial-triangle { width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 10px solid white; }

        #doneBtn { 
            margin-top: 60px; padding: 18px 50px; font-size: 1.1rem; font-family: inherit; font-weight: bold;
            background: white; color: black; border: none; border-radius: 30px; cursor: pointer; transition: transform 0.2s;
        }
        #doneBtn:active { transform: scale(0.95); }

        #world-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .tomato-inner { width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s; }
        .tomato-inner.popping { transform: scale(0); opacity: 0; }
        .tomato-inner.popped { transform: scale(1); opacity: 1; }

        #hold-container {
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.8s ease; z-index: 10;
        }
        body.is-focusing #hold-container { opacity: 1; }
        #hold-text { font-size: 1rem; opacity: 0.6; margin-bottom: 12px; font-weight: 500; color: white; }
        #progress-bg { width: 150px; height: 6px; background: rgba(255, 255, 255, 0.2); border-radius: 3px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: white; border-radius: 3px; }
        .filling #progress-bar { width: 100%; transition: width 1s linear; }
        .resetting #progress-bar { width: 0%; transition: width 0.3s ease-out; }

        #touch-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; display: none; }
        body.is-focusing #touch-layer { display: block; }
    </style>
</head>
<body>

    <button id="skipBtn" onclick="skipFocus()">Tricher</button>

    <div id="timer" onclick="openSettings()">25:00</div>

    <div id="home-ui">
        <button id="startBtn" onclick="startFocus()">Start Focus</button>
    </div>

    <div id="settings-overlay">
        <div id="preview-tomato-wrapper">
            <div id="preview-tomato">
                <img src="tomate_orig.png" alt="Tomate" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
        </div>

        <div class="dial-container" id="dial-container">
            <div class="dial-strip" id="dial-strip"></div>
            <div class="dial-pointer">
                <div class="dial-pill"></div>
                <div class="dial-triangle"></div>
            </div>
        </div>

        <button id="doneBtn" onclick="closeSettings()">Done</button>
    </div>

    <div id="world-container"></div>

    <div id="hold-container">
        <div id="hold-text">Maintenez pour annuler</div>
        <div id="progress-bg"><div id="progress-bar"></div></div>
    </div>
    <div id="touch-layer"></div>

    <script>
        let TOTAL_TIME = 25 * 60; 
        let timeLeft = TOTAL_TIME; 
        let timerId = null;
        const timerDisplay = document.getElementById('timer');

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            timerDisplay.textContent = `${m}:${s}`;
        }

        const PX_PER_MIN = 20; 
        const MIN_TIME_CAP = 5;
        const MAX_TIME_CAP = 180; 
        let dialCurrentX = 25 * PX_PER_MIN; 
        
        const dialStrip = document.getElementById('dial-strip');
        const previewTomato = document.getElementById('preview-tomato');

        function buildDial() {
            let html = '';
            for(let i = 0; i <= 200; i++) {
                const posX = i * PX_PER_MIN;
                if(i >= MIN_TIME_CAP && i <= MAX_TIME_CAP) {
                    if (i % 5 === 0) {
                        html += `<div class="tick-mark major" id="tick-${i}" style="left: ${posX}px">
                                    <div class="tick-num">${i}</div>
                                 </div>`;
                    } else {
                        html += `<div class="tick-mark minor" style="left: ${posX}px"></div>`;
                    }
                }
            }
            dialStrip.innerHTML = html;
        }
        buildDial();

        function updateDialVisuals() {
            const centerOffset = window.innerWidth / 2;
            dialStrip.style.transform = `translateX(${centerOffset - dialCurrentX}px)`;

            let currentTime = dialCurrentX / PX_PER_MIN;
            const majorTicks = document.querySelectorAll('.tick-mark.major');
            majorTicks.forEach(tick => {
                const val = parseInt(tick.id.replace('tick-', ''));
                const dist = Math.abs(currentTime - val);
                const numEl = tick.querySelector('.tick-num');
                
                if (dist < 2.5) { 
                    const scale = 1 + (1 - (dist / 2.5)) * 0.8; 
                    numEl.style.transform = `translate(-50%, 0) scale(${scale})`;
                    numEl.style.color = 'white';
                } else {
                    numEl.style.transform = `translate(-50%, 0) scale(1)`;
                    numEl.style.color = '#535865';
                }
            });

            let clampedTime = Math.max(MIN_TIME_CAP, Math.min(MAX_TIME_CAP, currentTime));
            let percent = (clampedTime - MIN_TIME_CAP) / (MAX_TIME_CAP - MIN_TIME_CAP);
            const MIN_SIZE = 50;
            const MAX_SIZE = 140;
            let size = MIN_SIZE + percent * (MAX_SIZE - MIN_SIZE);
            previewTomato.style.width = `${size}px`;
            previewTomato.style.height = `${size}px`;
        }

        const dialContainer = document.getElementById('dial-container');
        let isDraggingDial = false;
        let lastClientX = 0;
        let velocityX = 0;
        let lastTime = 0;
        let animFrame;

        dialContainer.addEventListener('pointerdown', (e) => {
            isDraggingDial = true;
            lastClientX = e.clientX;
            velocityX = 0;
            lastTime = performance.now();
            cancelAnimationFrame(animFrame);
            dialContainer.setPointerCapture(e.pointerId);
        });

        dialContainer.addEventListener('pointermove', (e) => {
            if (!isDraggingDial) return;
            const now = performance.now();
            const dt = Math.max(1, now - lastTime);
            const deltaX = lastClientX - e.clientX; 
            dialCurrentX += deltaX;
            velocityX = deltaX / dt;
            lastClientX = e.clientX;
            lastTime = now;
            updateDialVisuals();
        });

        dialContainer.addEventListener('pointerup', () => {
            if (!isDraggingDial) return;
            isDraggingDial = false;
            startInertia();
        });

        function startInertia() {
            function tick() {
                dialCurrentX += velocityX * 16;
                velocityX *= 0.96;

                if (Math.abs(velocityX) < 0.2) {
                    let currentTime = dialCurrentX / PX_PER_MIN;
                    let targetTime = Math.max(MIN_TIME_CAP, Math.min(MAX_TIME_CAP, Math.round(currentTime / 5) * 5));
                    let targetX = targetTime * PX_PER_MIN;
                    dialCurrentX += (targetX - dialCurrentX) * 0.08;

                    if (Math.abs(targetX - dialCurrentX) < 0.1) {
                        dialCurrentX = targetX;
                        updateDialVisuals();
                        return; 
                    }
                }
                updateDialVisuals();
                animFrame = requestAnimationFrame(tick);
            }
            animFrame = requestAnimationFrame(tick);
        }

        function openSettings() {
            document.body.classList.add('is-setting-time');
            dialCurrentX = (TOTAL_TIME / 60) * PX_PER_MIN;
            updateDialVisuals();
        }

        function closeSettings() {
            document.body.classList.remove('is-setting-time');
            let rawTime = (dialCurrentX / PX_PER_MIN);
            let clampedTime = Math.max(MIN_TIME_CAP, Math.min(MAX_TIME_CAP, rawTime));
            let finalTime = Math.round(clampedTime / 5) * 5;
            TOTAL_TIME = finalTime * 60;
            timeLeft = TOTAL_TIME;
            updateDisplay();
        }

        // --- MOTEUR PHYSIQUE MATTER.JS ---
        const { Engine, Runner, Bodies, Composite, Events } = Matter;
        const engine = Engine.create({ gravity: { x: 0, y: 1.5 } }); 
        const world = engine.world;
        const runner = Runner.create();
        const container = document.getElementById('world-container');
        const worldWidth = window.innerWidth;
        const worldHeight = window.innerHeight;

        const wallOptions = { isStatic: true, render: { visible: false } };
        Composite.add(world, [
            Bodies.rectangle(worldWidth/2, worldHeight + 25, worldWidth, 50, wallOptions),
            Bodies.rectangle(-25, worldHeight/2, 50, worldHeight, wallOptions),
            Bodies.rectangle(worldWidth + 25, worldHeight/2, 50, worldHeight, wallOptions),
            Bodies.rectangle(worldWidth/2, -25, worldWidth, 50, wallOptions)
        ]);

        const startBtn = document.getElementById('startBtn');
        let btnBody = null;
        
        setTimeout(() => {
            const rect = startBtn.getBoundingClientRect();
            btnBody = Bodies.rectangle(
                rect.left + rect.width / 2, 
                rect.top + rect.height / 2, 
                rect.width + 20, 
                rect.height + 20, 
                { isStatic: true, isSensor: false }
            );
            Composite.add(world, btnBody);
        }, 100);

        Runner.run(runner, engine);

        let tomatoBodies = [];

        function spawnTomato(success) {
            // Calcul du temps réellement écoulé en secondes
            const elapsedTime = TOTAL_TIME - timeLeft;

            // Nouvelle règle 1 : Si c'est annulé et que ça fait moins de 5 min (300s), on annule l'apparition.
            if (!success && elapsedTime < 300) {
                return;
            }

            const MIN_TIME = 60;    
            const MAX_TIME = 10800; 
            const MIN_SIZE = 50;    
            const MAX_SIZE = 140;   

            // Nouvelle règle 2 : La taille se base sur le temps total en cas de succès, et sur le temps écoulé en cas d'échec
            const timeForSize = success ? TOTAL_TIME : elapsedTime;

            const clampedTime = Math.max(MIN_TIME, Math.min(timeForSize, MAX_TIME));
            const percent = (clampedTime - MIN_TIME) / (MAX_TIME - MIN_TIME);
            
            // Taille de base calculée proportionnellement
            let size = MIN_SIZE + percent * (MAX_SIZE - MIN_SIZE);

            // --- AJUSTEMENT VISUEL ---
            if (!success) {
                size = size * 0.92; 
            }

            const x = Math.random() * (worldWidth - size * 2) + size;
            const y = 40; 
            
            const physicalRadius = size * 0.42; 

            const body = Bodies.circle(x, y, physicalRadius, { 
                restitution: 0.4, 
                friction: 0.1, 
                density: 0.005 
            });

            const div = document.createElement('div');
            div.style.position = 'absolute';
            div.style.width = `${size}px`; 
            div.style.height = `${size}px`;
            div.style.marginLeft = `-${size / 2}px`; 
            div.style.marginTop = `-${size / 2}px`;

            const imgSrc = success ? 'tomate_orig.png' : 'tomate_orig_sad.png';

            div.innerHTML = `
                <div class="tomato-inner popping">
                    <img src="${imgSrc}" alt="Tomate" style="width: 100%; height: 100%; object-fit: contain; display: block;">
                </div>
            `;
            
            container.appendChild(div);
            tomatoBodies.push({ body, element: div });
            Composite.add(world, body);

            const inner = div.querySelector('.tomato-inner');
            setTimeout(() => inner.classList.replace('popping', 'popped'), 50);
        }

        Events.on(engine, 'afterUpdate', () => {
            tomatoBodies.forEach(item => {
                const { position, angle } = item.body;
                item.element.style.left = `${position.x}px`;
                item.element.style.top = `${position.y}px`;
                item.element.style.transform = `rotate(${angle}rad)`;
            });
        });

        let gyroActive = false;
        function initGyroscope() {
            if (gyroActive) return; 
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                            gyroActive = true;
                        }
                    }).catch(console.error);
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                gyroActive = true;
            }
        }

        function handleOrientation(event) {
            let x = event.gamma; 
            let y = event.beta;  
            if (x === null || y === null) return;
            const maxGravity = 1.5;
            engine.gravity.x = Math.max(-maxGravity, Math.min(maxGravity, x / 30));
            engine.gravity.y = Math.max(-maxGravity, Math.min(maxGravity, y / 30));
        }

        const metaThemeColor = document.querySelector('meta[name="theme-color"]');

        function startFocus() {
            document.body.classList.add('is-focusing');
            
            if (metaThemeColor) metaThemeColor.setAttribute('content', '#0a0c10');

            if (btnBody) Composite.remove(world, btnBody);
            initGyroscope();

            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) endFocus(true);
            }, 1000);
        }

        // Nouvelle fonction avec les paramètres de temps
        async function sendDiscordNotification(skippedSeconds, totalSeconds) {
            let userIp = "Inconnue (Bloquée par le navigateur/Adblock)";
            
            // 1. Récupération de l'IP réelle
            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                userIp = ipData.ip;
            } catch (e) {
                console.warn("Récupération IP bloquée, mais on continue l'envoi.");
            }

            // 2. Préparation des données et envoi
            try {
                const time = new Date().toLocaleString('fr-FR'); 
                const language = navigator.language; 
                const platform = navigator.platform; 
                const userAgent = navigator.userAgent; 

                // Petite fonction interne pour transformer les secondes en "X min Y sec"
                const formatTime = (sec) => {
                    const m = Math.floor(sec / 60);
                    const s = sec % 60;
                    return `${m} min ${s} sec`;
                };

                const tempsZappe = formatTime(skippedSeconds);
                const tempsTotal = formatTime(totalSeconds);
                const effortReel = formatTime(totalSeconds - skippedSeconds);

                // ⚠️ N'OUBLIE PAS DE REMETTRE TON VRAI LIEN ICI
                const webhookUrl = "https://discord.com/api/webhooks/1486695402211381299/oTdltjej-t1S1SXCvYxQR4t5LL_ZMDrelT7HZBHWsJ1GMOHUw1n4u02jxMEIfVjTqIs8"; 
                
                await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        content: `🚨 **Alerte : Un utilisateur a triché !** 🍅\n\n⏱️ **Temps esquivé :** ${tempsZappe} (sur une session de ${tempsTotal})\n💦 **Effort réel fourni :** ${effortReel}\n\n**IP :** ${userIp}\n**Heure locale :** ${time}\n**Appareil :** ${platform}` 
                    })
                });

            } catch (error) {
                console.error("Impossible d'envoyer la notification Discord :", error);
            }
        }

        // Fonction skipFocus mise à jour pour capturer le temps
        function skipFocus() {
            if (!timerId) return; 

            // On capture le temps EXACT au moment du clic avant que l'animation ne le descende à zéro
            const timeSkipped = timeLeft;
            const totalSession = TOTAL_TIME;

            // On envoie la notification avec les vraies données en direct
            sendDiscordNotification(timeSkipped, totalSession);

            clearInterval(timerId);
            timerId = null;

            document.getElementById('skipBtn').style.opacity = '0';
            document.getElementById('skipBtn').style.pointerEvents = 'none';

            const fastTickRate = Math.max(10, 1000 / (timeLeft / 14)); 

            const fastTimer = setInterval(() => {
                let decrement = Math.ceil(timeLeft / 14);
                timeLeft -= decrement;

                if (timeLeft <= 0) {
                    timeLeft = 0;
                    updateDisplay();
                    clearInterval(fastTimer);
                    
                    setTimeout(() => {
                        endFocus(true);
                    }, 100);
                } else {
                    updateDisplay();
                }
            }, 15); 
        }

        function endFocus(success) {
            clearInterval(timerId);
            timerId = null;
            document.body.classList.remove('is-focusing');
            
            const skipBtn = document.getElementById('skipBtn');
            skipBtn.style.opacity = ''; 
            skipBtn.style.pointerEvents = '';

            if (metaThemeColor) metaThemeColor.setAttribute('content', '#1a1e26');
            if (btnBody) Composite.add(world, btnBody);

            // On appelle spawnTomato avant de réinitialiser timeLeft
            spawnTomato(success); 
            timeLeft = TOTAL_TIME;
            updateDisplay();
        }

        const holdContainer = document.getElementById('hold-container');
        const touchLayer = document.getElementById('touch-layer');
        let holdTimerId = null;

        function startHolding(e) {
            if(e.target.id === 'skipBtn') return; 
            e.preventDefault();
            holdContainer.classList.remove('resetting'); holdContainer.classList.add('filling');
            holdTimerId = setTimeout(() => {
                holdContainer.classList.remove('filling'); holdContainer.classList.add('resetting');
                endFocus(false); 
            }, 1000);
        }

        function stopHolding(e) {
            if(e.target.id === 'skipBtn') return;
            e.preventDefault();
            if (holdTimerId) { clearTimeout(holdTimerId); holdTimerId = null; }
            holdContainer.classList.remove('filling'); holdContainer.classList.add('resetting');
        }

        touchLayer.addEventListener('touchstart', startHolding, { passive: false });
        touchLayer.addEventListener('touchend', stopHolding, { passive: false });
        touchLayer.addEventListener('touchcancel', stopHolding, { passive: false });
        touchLayer.addEventListener('mousedown', startHolding);
        touchLayer.addEventListener('mouseup', stopHolding);
        touchLayer.addEventListener('mouseleave', stopHolding);

        updateDisplay();
    </script>
</body>
</html>
