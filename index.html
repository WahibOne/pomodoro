<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Pomo</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/135/135763.png">
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; background-color: #ff6b6b; color: white; 
            overflow: hidden;
        }
        h1 { margin-top: 0; }
        #timer { font-size: 6rem; font-weight: bold; margin: 20px 0; font-variant-numeric: tabular-nums; }
        button { 
            padding: 15px 40px; font-size: 1.2rem; border: none; border-radius: 25px; 
            background: white; color: #ff6b6b; cursor: pointer; font-weight: bold; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:active { transform: scale(0.95); }
        
        /* Animation des tomates */
        #tomato-basket {
            margin-top: 40px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 80%;
            min-height: 50px;
        }
        .tomato {
            font-size: 2.5rem;
            opacity: 0;
            transform: scale(0);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0) rotate(-15deg); opacity: 0; }
            50% { transform: scale(1.3) rotate(10deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
    </style>
</head>
<body>
    <h1>Focus</h1>
    <div id="timer">25:00</div>
    <button id="startBtn" onclick="toggleTimer()">Démarrer</button>
    
    <div id="tomato-basket"></div>

    <script>
        // Le temps est réglé sur 25 minutes. 
        // Astuce : pour tester l'animation tout de suite, remplace "25 * 60" par "5" (5 secondes)
        let timeLeft = 25 * 60; 
        let timerId = null;
        const timerDisplay = document.getElementById('timer');
        const btn = document.getElementById('startBtn');
        const basket = document.getElementById('tomato-basket');

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            timerDisplay.textContent = `${m}:${s}`;
        }

        function toggleTimer() {
            if (timerId) {
                // Mise en pause
                clearInterval(timerId);
                timerId = null;
                btn.textContent = 'Reprendre';
            } else {
                // Démarrage
                btn.textContent = 'Pause';
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        timerId = null;
                        
                        // Création de la tomate animée
                        const newTomato = document.createElement('div');
                        newTomato.className = 'tomato';
                        newTomato.textContent = '🍅';
                        basket.appendChild(newTomato);

                        // Réinitialisation du minuteur
                        timeLeft = 25 * 60;
                        btn.textContent = 'Démarrer';
                        updateDisplay();
                    }
                }, 1000);
            }
        }

        // Activation du Service Worker pour l'installation sur iPhone
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
